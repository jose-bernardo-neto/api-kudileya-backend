version: '3.8'

services:
  api:
    container_name: kudileya-api
    build:
      context: .
      dockerfile: Dockerfile
    image: kudileya-api:latest
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      ADMIN_KEY: ${ADMIN_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-pro}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GROK_MODEL: ${GROK_MODEL:-grok-beta}
      AI_TIMEOUT: ${AI_TIMEOUT:-30000}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1000}
      AI_SYSTEM_PROMPT: ${AI_SYSTEM_PROMPT:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-900000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

    restart: unless-stopped

    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3333/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

    networks:
      - kudileya-network

networks:
  kudileya-network:
    driver: bridge
