version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: kudileya-api:latest
    container_name: kudileya-api
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=production
      - PORT=3333
      - HOST=0.0.0.0
      - ADMIN_KEY=${ADMIN_KEY:-change-me-in-production}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - AI_MODEL=${AI_MODEL:-gemini-1.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - CACHE_TTL=${CACHE_TTL:-300}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_TIME_WINDOW=${RATE_LIMIT_TIME_WINDOW:-900000}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - kudileya-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3333/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  kudileya-network:
    driver: bridge

volumes:
  data:
  uploads:
